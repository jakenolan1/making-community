<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>First Wednesdays</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #e7e1d8;
    overflow: hidden;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; -webkit-tap-highlight-color: transparent; }

  #canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    overflow: hidden;
    cursor: grab;
    touch-action: none;
    user-select: none;
  }
  #canvas.grabbing { cursor: grabbing; }

  #grid {
    position: absolute;
    inset: -200px;
    background-image:
      linear-gradient(to right,  rgba(31,29,26,.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(31,29,26,.05) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
  }

  #world {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* tiles are absolute-positioned via transform; pointer-events on */
  .tile {
    position: absolute;
    left: 0; top: 0;
    display: block;
    text-decoration: none;
    will-change: transform;
    pointer-events: auto;
  }
  .tile-img {
    position: absolute;
    inset: 0;
    overflow: hidden;
    transition: transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s ease;
    box-shadow: 0 1px 2px rgba(31,29,26,.06);
  }
  .tile-texture {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      135deg,
      rgba(31,29,26,.035) 0 2px,
      transparent 2px 11px
    );
  }
  .tile-label-photo {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: rgba(31,29,26,.26);
  }
  .tile-date {
    position: absolute;
    left: 13px;
    bottom: 11px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: rgba(31,29,26,.72);
  }

  #headline {
    position: fixed;
    inset: 0;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    pointer-events: none;
    transition: opacity .28s ease;
    line-height: 0.84;
  }
  #hl-month,
  #hl-year {
    font-size: 13.5vw;
    font-weight: 500;
    letter-spacing: -0.035em;
    color: #faf6ef;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 34px;
    pointer-events: none;
  }
  .logo {
    pointer-events: auto;
    text-decoration: none;
    display: flex;
    align-items: baseline;
    gap: 9px;
  }
  .logo-name {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: #2a2723;
  }
  .logo-by {
    font-size: 12.5px;
    color: rgba(42,39,35,.55);
  }
  nav {
    pointer-events: auto;
    display: flex;
    gap: 28px;
  }
  nav a {
    text-decoration: none;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: #2a2723;
  }

  #hint {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(42,39,35,.4);
    pointer-events: none;
    transition: opacity .6s ease;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="headline">
  <span id="hl-month">June</span>
  <span id="hl-year">2026</span>
</div>

<div id="canvas">
  <div id="grid"></div>
  <div id="world"></div>
</div>

<header>
  <a href="index.html" class="logo">
    <span class="logo-name">First Wednesdays</span>
    <span class="logo-by">by Lisa Abrego</span>
  </a>
  <nav>
    <a href="about.html">About</a>
    <a href="index.html">Catalog</a>
  </nav>
</header>

<div id="hint">drag in any direction</div>

<script>
(function () {
  const GATHERINGS = [
    {id:'2026-06',month:'June',    year:'2026',short:'JUN 2026',theme:'Long table, longest day',         tone:'#d9d2c6',x:690, y:560, w:300},
    {id:'2026-05',month:'May',     year:'2026',short:'MAY 2026',theme:'Garden cuttings & cold rosé', tone:'#cfc7ba',x:120, y:120, w:260},
    {id:'2026-04',month:'April',   year:'2026',short:'APR 2026',theme:'Everything green',               tone:'#ddd6cb',x:1180,y:90,  w:300},
    {id:'2026-03',month:'March',   year:'2026',short:'MAR 2026',theme:'Citrus & first warmth',        tone:'#d2cabd',x:300, y:620, w:240},
    {id:'2026-02',month:'February',year:'2026',short:'FEB 2026',theme:'Soup night',                     tone:'#e0dacf',x:1240,y:560, w:280},
    {id:'2026-01',month:'January', year:'2026',short:'JAN 2026',theme:'Clean slate, full pot',          tone:'#c9c2b5',x:60,  y:980, w:300},
    {id:'2025-12',month:'December',year:'2025',short:'DEC 2025',theme:'Candles & clementines',       tone:'#d6cfc3',x:560, y:140, w:270},
    {id:'2025-11',month:'November',year:'2025',short:'NOV 2025',theme:'Harvest, hands full',            tone:'#dbd4c8',x:980, y:980, w:300},
    {id:'2025-10',month:'October', year:'2025',short:'OCT 2025',theme:'Borrowed from the orchard',     tone:'#cdc6b9',x:1320,y:1080,w:260},
    {id:'2025-09',month:'September',year:'2025',short:'SEP 2025',theme:'Late tomatoes',                tone:'#e2dcd1',x:520, y:1060,w:280},
  ];

  // World tile dimensions (at density "Balanced")
  const CW = 1680;
  const CH = 1480;

  const canvas  = document.getElementById('canvas');
  const world   = document.getElementById('world');
  const grid    = document.getElementById('grid');
  const headline = document.getElementById('headline');
  const hlMonth = document.getElementById('hl-month');
  const hlYear  = document.getElementById('hl-year');
  const hint    = document.getElementById('hint');

  // canvas offset
  let ox = 0, oy = 0;
  // velocity
  let vx = 0, vy = 0;
  // drag state
  let dragging = false, didDrag = false, moved = 0, lx = 0, ly = 0;
  // auto-center before first touch
  let userMoved = false;
  // headline crossfade state
  let currentTile = null;
  let hlTimer = null;

  // Build tile DOM + data
  const tiles = GATHERINGS.map(function(b) {
    const w = b.w, h = Math.round(b.w * 1.25);
    const copies = [];

    for (let di = -1; di <= 1; di++) {
      for (let dj = -1; dj <= 1; dj++) {
        const el = makeTileEl(b, w, h);
        world.appendChild(el);
        copies.push({ el, di, dj });
      }
    }
    return { ...b, w, h, copies };
  });

  function makeTileEl(b, w, h) {
    const a = document.createElement('a');
    a.href = 'gathering.html?m=' + b.id;
    a.draggable = false;
    a.className = 'tile';
    a.style.width  = w + 'px';
    a.style.height = h + 'px';

    const img = document.createElement('div');
    img.className = 'tile-img';
    img.style.background = b.tone;

    const tex = document.createElement('div');
    tex.className = 'tile-texture';
    img.appendChild(tex);

    const lbl = document.createElement('div');
    lbl.className = 'tile-label-photo';
    lbl.textContent = 'photo';
    img.appendChild(lbl);

    const date = document.createElement('div');
    date.className = 'tile-date';
    date.textContent = b.short;

    a.appendChild(img);
    a.appendChild(date);

    a.addEventListener('mouseenter', function() {
      img.style.transform = 'scale(1.035)';
      img.style.boxShadow = '0 14px 34px rgba(31,29,26,.17)';
      a.style.zIndex = '5';
    });
    a.addEventListener('mouseleave', function() {
      img.style.transform = '';
      img.style.boxShadow = '';
      a.style.zIndex = '';
    });
    a.addEventListener('click', function(e) {
      if (didDrag) { e.preventDefault(); e.stopPropagation(); }
    });
    return a;
  }

  // --- Drag interaction ---
  canvas.addEventListener('pointerdown', function(e) {
    dragging = true; didDrag = false; moved = 0;
    userMoved = true;
    lx = e.clientX; ly = e.clientY;
    vx = 0; vy = 0;
    try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
    canvas.classList.add('grabbing');
  });

  canvas.addEventListener('pointermove', function(e) {
    if (!dragging) return;
    const dx = e.clientX - lx, dy = e.clientY - ly;
    ox += dx; oy += dy;
    vx = dx; vy = dy;
    lx = e.clientX; ly = e.clientY;
    moved += Math.abs(dx) + Math.abs(dy);
    if (moved > 6) { didDrag = true; hideHint(); }
  });

  function onUp() {
    if (!dragging) return;
    dragging = false;
    canvas.classList.remove('grabbing');
  }
  canvas.addEventListener('pointerup', onUp);
  canvas.addEventListener('pointercancel', onUp);
  canvas.addEventListener('lostpointercapture', onUp);

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    userMoved = true;
    ox -= e.deltaX; oy -= e.deltaY;
    vx = 0; vy = 0;
    hideHint();
  }, { passive: false });

  function hideHint() {
    if (hint.style.opacity !== '0') hint.style.opacity = '0';
  }

  // --- Physics loop ---
  function loop() {
    if (!dragging) {
      ox += vx; oy += vy;
      vx *= 0.93; vy *= 0.93;
      if (Math.abs(vx) < 0.05) vx = 0;
      if (Math.abs(vy) < 0.05) vy = 0;
    }
    render();
    requestAnimationFrame(loop);
  }

  // --- Render ---
  function render() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const cx0 = vw / 2, cy0 = vh / 2;

    // Auto-center on first tile until user moves
    if (!userMoved && vw > 1 && vh > 1) {
      const t0 = tiles[0];
      ox = cx0 - (t0.x + t0.w / 2);
      oy = cy0 - (t0.y + t0.h / 2);
    }

    let bestDist = Infinity, bestTile = null;

    for (const t of tiles) {
      const baseN = Math.round((cx0 - (t.x + t.w / 2 + ox)) / CW);
      const baseM = Math.round((cy0 - (t.y + t.h / 2 + oy)) / CH);

      for (const c of t.copies) {
        const x = t.x + ox + (baseN + c.di) * CW;
        const y = t.y + oy + (baseM + c.dj) * CH;
        c.el.style.transform = `translate3d(${x}px,${y}px,0)`;
        const ccx = x + t.w / 2, ccy = y + t.h / 2;
        const d = (ccx - cx0) * (ccx - cx0) + (ccy - cy0) * (ccy - cy0);
        if (d < bestDist) { bestDist = d; bestTile = t; }
      }
    }

    if (bestTile && bestTile !== currentTile) setHeadline(bestTile);

    // Move grid with offset
    const g = 64;
    grid.style.backgroundPosition = `${ox % g}px ${oy % g}px`;
  }

  function setHeadline(t) {
    currentTile = t;
    headline.style.opacity = '0';
    clearTimeout(hlTimer);
    hlTimer = setTimeout(function() {
      hlMonth.textContent = t.month;
      hlYear.textContent  = t.year;
      headline.style.opacity = '1';
    }, 170);
  }

  // Initial render so tiles appear before loop starts
  render();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
